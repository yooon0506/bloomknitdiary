<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>개구리 링크 모음</title>

  <style>
    body { font-family: system-ui, sans-serif; background:#FCEFD9; color:#2A221A; margin:0; }

    /* ✅ 스크롤했을 때만 나타나는, 카드 너비 topbar (상단 라운드 없음) */
    .topbar{
      position: sticky;
      top: 0px;
      z-index: 999;

      width: min(520px, calc(100% - 48px));
      margin: 0 auto;

      background: rgba(252,239,217,0.92);
      backdrop-filter: blur(8px);

      border: 1px solid #E9D8B9;
      border-radius: 0 0 16px 16px;

      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;

      transition: opacity 160ms ease, transform 160ms ease, box-shadow 160ms ease;
    }
    .topbar.is-visible{
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .topbar.is-scrolled{
      box-shadow: 0 10px 22px rgba(42,34,26,0.10),
                  0 2px 6px rgba(42,34,26,0.06);
    }
    .topbar-inner{ padding: 12px 16px; }
    .topbar-title{
      font-weight:800;
      color:#4A3A2A;
      letter-spacing:-0.4px;
      font-size:16px;
    }

    .wrap { max-width:520px; margin:0 auto; padding:24px; }
    .card { background:#FFF6E8; border:1px solid #E9D8B9; border-radius:16px; padding:20px; }
    p { color:#5B4A35; }

    /* ✅ 카드형 버튼 + 그림자 */
    a.btn{
      position: relative;
      z-index: 1;

      display:flex;
      align-items:center;
      gap:12px;
      padding:16px 18px;
      margin:14px 0;

      background:#FFFDF7;
      border:1px solid #E9D8B9;
      border-radius:18px;

      color:#2A221A;
      text-decoration:none;
      font-weight:700;

      box-shadow: 0 10px 22px rgba(42,34,26,0.12),
                  0 2px 6px rgba(42,34,26,0.08);
      transition: transform 160ms ease, box-shadow 160ms ease;
    }
    a.btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(42,34,26,0.14),
                  0 3px 8px rgba(42,34,26,0.10);
      z-index: 20;
    }
    a.btn:active{
      transform: translateY(0px);
      box-shadow: 0 6px 14px rgba(42,34,26,0.12),
                  0 1px 4px rgba(42,34,26,0.08);
      z-index: 20;
    }
    a.btn:focus-visible{ z-index: 20; }

    /* 버튼 아이콘 */
    a.btn img{
      width:22px;
      height:22px;
      border-radius:6px;
      object-fit:contain;
      flex:0 0 auto;
    }

    /* ✅ 툴팁 (a.btn + .mail-copy 공통) */
    a.btn[data-desc],
    .mail-copy[data-desc]{
      position: relative;
    }

    a.btn[data-desc]::after,
    .mail-copy[data-desc]::after{
      content: attr(data-desc);
      position: absolute;
      right: 16px;
      bottom: calc(100% + 10px);

      background: rgba(255,253,247,0.98);
      border: 1px solid #E9D8B9;
      color: #4A3A2A;

      padding: 10px 12px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.2;

      box-shadow: 0 10px 22px rgba(42,34,26,0.10),
                  0 2px 6px rgba(42,34,26,0.06);

      opacity: 0;
      transform: translateY(4px);
      pointer-events: none;
      transition: opacity 140ms ease, transform 140ms ease;
      white-space: nowrap;

      z-index: 999;
    }

    a.btn[data-desc]::before,
    .mail-copy[data-desc]::before{
      content:"";
      position:absolute;
      right: 28px;
      bottom: calc(100% + 4px);
      width: 10px;
      height: 10px;
      background: rgba(255,253,247,0.98);
      border-right: 1px solid #E9D8B9;
      border-bottom: 1px solid #E9D8B9;
      transform: rotate(45deg);

      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events:none;

      z-index: 1000;
    }

    a.btn[data-desc]:hover::after,
    a.btn[data-desc]:focus-visible::after,
    a.btn[data-desc]:active::after,
    .mail-copy[data-desc]:hover::after,
    .mail-copy[data-desc]:focus-visible::after,
    .mail-copy[data-desc]:active::after{
      opacity: 1;
      transform: translateY(0);
    }

    a.btn[data-desc]:hover::before,
    a.btn[data-desc]:focus-visible::before,
    a.btn[data-desc]:active::before,
    .mail-copy[data-desc]:hover::before,
    .mail-copy[data-desc]:focus-visible::before,
    .mail-copy[data-desc]:active::before{
      opacity: 1;
    }

    /* ✅ 프로필 이미지(1:1) + 호버 교체 */
    .profile-wrap{
      position:relative;
      width:100%;
      aspect-ratio: 1 / 1;
      margin:0 0 14px;
      border:1px solid #E9D8B9;
      border-radius:16px;
      overflow:hidden;
      background:#FFF6E8;
    }
    .profile{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      transition:opacity 220ms ease;
    }
    .profile-nonhover{ opacity:1; }
    .profile-hover{ opacity:0; }
    .profile-wrap:hover .profile-nonhover,
    .profile-wrap:active .profile-nonhover{ opacity:0; }
    .profile-wrap:hover .profile-hover,
    .profile-wrap:active .profile-hover{ opacity:1; }

    /* 가운데 3개 아이콘 */
    .divider{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      margin:50px auto;
    }
    .divider img{
      width:26px;
      height:26px;
      object-fit:contain;
      transform: translateY(-1px);
    }

    /* 제목 */
    .title {
      margin:0 0 8px;
      font-size:18px;
      color:#4A3A2A;
      letter-spacing:-0.5px;
    }

    /* sub제목 */
    .subtitle {
      margin:10px 0 0;
      font-size:14px;
      color:#3A3A2A;
      letter-spacing:-0.5px;
    }

    /* ✅ 메일 복사 버튼 (타이틀 색으로) */
    .mail-copy{
      background: transparent;
      border: 0;
      padding: 0;
      margin-left: 6px;

      color:#4A3A2A;  /* ✅ title 색 */
      font-weight:700;
      font-size:14px;
      letter-spacing:-0.5px;

      cursor: pointer;
    }
    .mail-copy:hover{ text-decoration: underline; }

    /* ✅ 복사 토스트 */
    .copy-toast{
      display:inline-block;
      margin-left:10px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid #E9D8B9;
      background:#FFFDF7;
      color:#4A3A2A;
      font-size:12px;

      opacity:0;
      transform: translateY(2px);
      transition: opacity 160ms ease, transform 160ms ease;
    }
    .copy-toast.show{
      opacity:1;
      transform: translateY(0);
    }
body{
  -webkit-user-select: none;
  user-select: none;
  -webkit-touch-callout: none; /* iOS 길게누르기 메뉴 */
}

/* 클릭/복사/입력 가능한 요소는 선택 허용 */
a, button, input, textarea{
  -webkit-user-select: auto;
  user-select: auto;
}
  </style>
</head>

<body>
  <div class="topbar" id="topbar">
    <div class="topbar-inner">
      <div class="topbar-title">뜨괴구리 @bloomKnitDiary</div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="profile-wrap">
        <img class="profile profile-nonhover" src="assets/profile1.jpg" alt="밤1" />
        <img class="profile profile-hover" src="assets/profile2.jpg" alt="밤2" />
      </div>

      <div class="divider" aria-hidden="true">
        <img src="assets/line_ddo.png" alt="" />
        <img src="assets/line_bam.png" alt="" />
        <img src="assets/line_ho.png" alt="" />
      </div>

      <h1 class="title">뜨괴구리 링크모음</h1>

      <a class="btn" data-track="youtube" data-desc="뜨괴구리 유튜브 채널로 이동"
         href="https://www.youtube.com/channel/UC_Ra0YgNJ9lzAkodyk8MuGQ" target="_blank" rel="noopener">
        <img src="assets/youtube.png" alt="YouTube" />
        Youtube
      </a>

      <a class="btn" data-track="instagram" data-desc="인스타그램 구경하기"
         href="https://www.instagram.com/bloomknitdiary/" target="_blank" rel="noopener">
        <img src="assets/instagram.png" alt="Instagram" />
        Instagram
      </a>

      <a class="btn" data-track="blog" data-desc="네이버 블로그로 이동"
         href="https://blog.naver.com/yooon0506" target="_blank" rel="noopener">
        <img src="assets/blog.png" alt="Blog" />
        Blog
      </a>

      <div class="divider" aria-hidden="true">
        <img src="assets/line_ddo.png" alt="" />
        <img src="assets/line_bam.png" alt="" />
        <img src="assets/line_ho.png" alt="" />
      </div>

      <p class="subtitle">
        Business mail 💼
        <button class="mail-copy" data-track="business" data-desc="클릭하면 복사됨" type="button" onclick="copyEmail()">yooon0506@gmail.com</button>
        <span class="copy-toast" id="copyToast">복사 완료 🐸</span>
      </p>
    </div>
  </div>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
 <script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-QKM67F6D4D');
  const topbar = document.getElementById('topbar');

  function updateTopbar(){
    const y = window.scrollY || 0;

    if (y > 6) topbar.classList.add('is-visible');
    else topbar.classList.remove('is-visible');

    if (y > 16) topbar.classList.add('is-scrolled');
    else topbar.classList.remove('is-scrolled');
  }

  window.addEventListener('scroll', updateTopbar, { passive: true });
  window.addEventListener('load', updateTopbar);

  // ✅ 메일 복사
  async function copyEmail(){
    const email = "yooon0506@gmail.com";
    try{
      await navigator.clipboard.writeText(email);
    }catch(e){
      const ta = document.createElement("textarea");
      ta.value = email;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    const toast = document.getElementById("copyToast");
    toast.classList.add("show");
    clearTimeout(window.__toastTimer);
    window.__toastTimer = setTimeout(() => toast.classList.remove("show"), 1200);
  }

  // ✅ 우클릭/드래그/선택 방지
  document.addEventListener('contextmenu', (e) => {
    // 링크/버튼 위에서는 굳이 막고 싶지 않으면 아래 줄을 주석 처리 가능
    e.preventDefault();
  });
  document.querySelectorAll('a.btn[data-track]').forEach((a) => {
    a.addEventListener('click', () => {
      const name = a.dataset.track || 'unknown';
      const url = a.href;

      // GA4 커스텀 이벤트
      gtag('event', 'outbound_click', {
        link_name: name,
        link_url: url
      });
    });
  });

  document.addEventListener('dragstart', (e) => e.preventDefault());
  document.addEventListener('selectstart', (e) => e.preventDefault());
</script>
</body>
</html>
